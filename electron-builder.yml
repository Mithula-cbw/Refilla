appId: com.refilla.app
productName: Refilla
copyright: Copyright © 2025 Refilla

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - build/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/logo.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/logo.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Refilla

appImage:
  artifactName: Refilla-${version}.AppImage

publish: null
