appId: com.refilla.app
productName: Refilla
copyright: Copyright © 2025 Refilla

asar: true

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - build/icon.ico
  - build/icon.png
  - "!**/node_modules/*/{README,readme,CHANGELOG}*"
  - "!**/node_modules/*/{test,tests,__tests__,spec}/**"
  - "!**/node_modules/**/*.{map,ts,md}"
  - "!**/{.git,.svn,.DS_Store}"
  - "!**/node_modules/.cache/**"
  - "!**/*.{iml,hprof,orig,pyc,pyo,rbc,swp}"
  - "!**/._*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/logo.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: build/logo.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Refilla

appImage:
  artifactName: Refilla-${version}.AppImage

publish: null
