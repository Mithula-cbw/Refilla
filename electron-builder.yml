appId: com.aitrack.app
productName: AITrack
copyright: Copyright © 2025 AITrack

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: assets/icon.png
  category: Utility

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AITrack

appImage:
  artifactName: AITrack-${version}.AppImage

publish: null
